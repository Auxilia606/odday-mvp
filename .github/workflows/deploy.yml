name: Deploy to GitHub Pages

# main 브랜치에 푸시되면 정적 빌드 후 GitHub Pages로 배포한다.
# (레포 Settings → Pages → Source 를 "GitHub Actions"로 지정해야 동작함)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나의 배포만 진행
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 환경(github-pages) 시크릿은 그 환경을 선언한 job에서만 접근 가능하다.
    # VITE_* 값을 빌드 시점에 번들에 주입해야 하므로 build job에도 선언한다.
    environment: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Settings → Environments → github-pages 의 환경 시크릿에서 주입.
          # 비어 있으면 PostHog 수집 없이 빌드된다. (MVP 문서 섹션 19)
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
